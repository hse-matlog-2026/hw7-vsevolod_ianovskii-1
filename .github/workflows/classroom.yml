name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: test1
      id: test1
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: test1
        setup-command: ''
        command: python test_chapter07_01.py
        timeout: 1
        max-score: 1
    - name: test2
      id: test2
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: test2
        setup-command: ''
        command: python test_chapter07_02.py
        timeout: 1
        max-score: 1
    - name: test3
      id: test3
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: test3
        setup-command: ''
        command: python test_chapter07_03.py
        timeout: 1
        max-score: 1
    - name: test4
      id: test4
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: test4
        setup-command: ''
        command: python test_chapter07_04.py
        timeout: 1
        max-score: 1
    - name: test5
      id: test5
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: test5
        setup-command: ''
        command: python test_chapter07_05.py
        timeout: 1
        max-score: 1
    - name: test6
      id: test6
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: test6
        setup-command: ''
        command: python test_chapter07_06.py
        timeout: 1
        max-score: 1
    - name: test7
      id: test7
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: test7
        setup-command: ''
        command: python test_chapter07_07.py
        timeout: 1
        max-score: 1
    - name: test8
      id: test8
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: test8
        setup-command: ''
        command: python test_chapter07_08.py
        timeout: 1
        max-score: 1
    - name: test9
      id: test9
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: test9
        setup-command: ''
        command: python test_chapter07_09.py
        timeout: 1
        max-score: 1
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TEST1_RESULTS: "${{steps.test1.outputs.result}}"
        TEST2_RESULTS: "${{steps.test2.outputs.result}}"
        TEST3_RESULTS: "${{steps.test3.outputs.result}}"
        TEST4_RESULTS: "${{steps.test4.outputs.result}}"
        TEST5_RESULTS: "${{steps.test5.outputs.result}}"
        TEST6_RESULTS: "${{steps.test6.outputs.result}}"
        TEST7_RESULTS: "${{steps.test7.outputs.result}}"
        TEST8_RESULTS: "${{steps.test8.outputs.result}}"
        TEST9_RESULTS: "${{steps.test9.outputs.result}}"
      with:
        runners: test1,test2,test3,test4,test5,test6,test7,test8,test9
